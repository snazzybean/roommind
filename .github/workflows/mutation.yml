name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "mutmut>=3.5"

      - name: Restore mutmut cache
        uses: actions/cache@v4
        with:
          path: mutants/
          key: mutmut-${{ hashFiles('custom_components/**/*.py') }}
          restore-keys: |
            mutmut-

      - name: Run mutation testing
        run: |
          mutmut run || EXIT=$?
          if [ "${EXIT:-0}" -ge 2 ]; then
            echo "::error::mutmut failed with exit code $EXIT"
            exit $EXIT
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$(mutmut results 2>&1 | wc -c)" -gt 500000 ]; then
            echo "... (truncated, full report in artifact)" >> $GITHUB_STEP_SUMMARY
            mutmut results 2>&1 | tail -c 500000 >> $GITHUB_STEP_SUMMARY
          else
            mutmut results >> $GITHUB_STEP_SUMMARY 2>&1 || true
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate artifact
        if: always()
        run: |
          mutmut results > mutation-report.txt 2>&1 || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutation-report.txt
          retention-days: 30
