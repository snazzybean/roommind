name: Mutation Testing

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  mutation-test:
    name: "Mutate: ${{ matrix.module }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - custom_components/roommind/coordinator.py
          - custom_components/roommind/control/
          - custom_components/roommind/managers/
          - custom_components/roommind/utils/
          - custom_components/roommind/store.py
          - custom_components/roommind/websocket_api.py
          - custom_components/roommind/sensor.py custom_components/roommind/climate.py custom_components/roommind/switch.py custom_components/roommind/binary_sensor.py custom_components/roommind/diagnostics.py custom_components/roommind/services/
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "mutmut>=3.5"

      - name: Restore mutmut cache
        uses: actions/cache@v4
        with:
          path: .mutmut-cache
          key: mutmut-${{ hashFiles('custom_components/**/*.py') }}-${{ strategy.job-index }}
          restore-keys: |
            mutmut-${{ hashFiles('custom_components/**/*.py') }}-${{ strategy.job-index }}
            mutmut-

      - name: Run mutation testing
        run: |
          # mutmut exits 1 when mutants survive (expected), 2+ on real errors
          mutmut run ${{ matrix.module }} || EXIT=$?
          if [ "${EXIT:-0}" -ge 2 ]; then
            echo "::error::mutmut failed with exit code $EXIT"
            exit $EXIT
          fi

      - name: Post summary
        if: always()
        run: |
          echo "## Mutation: \`${{ matrix.module }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Only write the summary line, not all mutant details (1MB limit)
          mutmut results 2>&1 | head -20 >> $GITHUB_STEP_SUMMARY || true
